name: Build SmartAction

on:
  push:
    branches: [ main, master ]
    tags:    [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Setup .NET SDK
      # -----------------------------------------------------------------------
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # -----------------------------------------------------------------------
      # 3. Restore managed reference DLLs
      #
      #    You need a secret called MANAGED_REFS_B64 containing a base64-encoded
      #    zip of the following DLLs from your SPT 4.0.13 install:
      #
      #      Assembly-CSharp.dll            (EscapeFromTarkov_Data/Managed/)
      #      Assembly-CSharp-firstpass.dll  (EscapeFromTarkov_Data/Managed/)
      #      UnityEngine.dll                (EscapeFromTarkov_Data/Managed/)
      #      UnityEngine.CoreModule.dll     (EscapeFromTarkov_Data/Managed/)
      #      BepInEx.dll                    (BepInEx/core/)
      #      0Harmony.dll                   (BepInEx/core/)
      #
      #    How to create the secret (PowerShell):
      #      Compress-Archive -Path `
      #        "C:\SPT\EscapeFromTarkov_Data\Managed\Assembly-CSharp.dll",
      #        "C:\SPT\EscapeFromTarkov_Data\Managed\Assembly-CSharp-firstpass.dll",
      #        "C:\SPT\EscapeFromTarkov_Data\Managed\UnityEngine.dll",
      #        "C:\SPT\EscapeFromTarkov_Data\Managed\UnityEngine.CoreModule.dll",
      #        "C:\SPT\BepInEx\core\BepInEx.dll",
      #        "C:\SPT\BepInEx\core\0Harmony.dll" `
      #        -DestinationPath managed_refs.zip
      #      [Convert]::ToBase64String([IO.File]::ReadAllBytes('managed_refs.zip')) | Set-Clipboard
      #
      #    Then add it at:
      #      GitHub repo → Settings → Secrets and variables → Actions → New secret
      #      Name: MANAGED_REFS_B64
      # -----------------------------------------------------------------------
      - name: Check MANAGED_REFS_B64 secret is set
        run: |
          if [ -z "${{ secrets.MANAGED_REFS_B64 }}" ]; then
            echo "::error::Secret MANAGED_REFS_B64 is not set."
            echo "::error::See the 'Restore managed refs' step comments in build.yml for instructions."
            exit 1
          fi

      - name: Restore managed refs
        run: |
          printf '%s' "${{ secrets.MANAGED_REFS_B64 }}" | base64 -d > managed_refs.zip
          mkdir -p refs
          unzip -j managed_refs.zip "*.dll" -d refs/
          echo "Extracted refs:"
          ls -lh refs/

      # -----------------------------------------------------------------------
      # 4. Generate SmartAction.csproj on the fly
      # -----------------------------------------------------------------------
      - name: Generate SmartAction.csproj
        run: |
          cat > SmartAction.csproj << 'CSPROJ'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net472</TargetFramework>
              <AssemblyName>SmartAction</AssemblyName>
              <RootNamespace>SmartAction</RootNamespace>
              <Nullable>enable</Nullable>
              <LangVersion>latest</LangVersion>
              <AllowUnsafeBlocks>true</AllowUnsafeBlocks>
              <Optimize>true</Optimize>
              <Deterministic>true</Deterministic>
              <OutputPath>bin/Release/</OutputPath>
              <AppendTargetFrameworkToOutputPath>false</AppendTargetFrameworkToOutputPath>
              <CopyLocalLockFileAssemblies>false</CopyLocalLockFileAssemblies>
            </PropertyGroup>
            <ItemGroup>
              <Reference Include="Assembly-CSharp">
                <HintPath>refs/Assembly-CSharp.dll</HintPath>
                <Private>false</Private>
              </Reference>
              <Reference Include="Assembly-CSharp-firstpass">
                <HintPath>refs/Assembly-CSharp-firstpass.dll</HintPath>
                <Private>false</Private>
              </Reference>
              <Reference Include="BepInEx">
                <HintPath>refs/BepInEx.dll</HintPath>
                <Private>false</Private>
              </Reference>
              <Reference Include="0Harmony">
                <HintPath>refs/0Harmony.dll</HintPath>
                <Private>false</Private>
              </Reference>
              <Reference Include="UnityEngine">
                <HintPath>refs/UnityEngine.dll</HintPath>
                <Private>false</Private>
              </Reference>
              <Reference Include="UnityEngine.CoreModule">
                <HintPath>refs/UnityEngine.CoreModule.dll</HintPath>
                <Private>false</Private>
              </Reference>
            </ItemGroup>
          </Project>
          CSPROJ

      # -----------------------------------------------------------------------
      # 5. Build
      # -----------------------------------------------------------------------
      - name: Build (Release)
        run: dotnet build SmartAction.csproj -c Release --nologo

      # -----------------------------------------------------------------------
      # 6. Upload artifact
      # -----------------------------------------------------------------------
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartAction
          path: bin/Release/SmartAction.dll
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # 7. Create GitHub Release on tag push (v*)
      # -----------------------------------------------------------------------
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Release/SmartAction.dll
          generate_release_notes: true
